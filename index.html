<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬GO 포켓몬 관리 가이드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    padding: 12px 0;
    color: #fff;
  }

  .search-box {
    position: sticky;
    top: 0;
    background: #1a1a2e;
    padding: 8px 0 12px;
    z-index: 10;
  }

  .search-box input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #333;
    border-radius: 12px;
    background: #16213e;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: #e94560;
  }

  .search-box input::placeholder {
    color: #666;
  }

  .filters {
    display: flex;
    gap: 6px;
    padding: 4px 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border: none;
    border-radius: 20px;
    background: #16213e;
    color: #aaa;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: #1a3a5c; }

  .filter-btn.active {
    color: #fff;
    font-weight: 600;
  }

  .filter-btn.active[data-cat="all"]     { background: #e94560; }
  .filter-btn.active[data-cat="powerup"] { background: #e94560; }
  .filter-btn.active[data-cat="ultra"]   { background: #0f3460; }
  .filter-btn.active[data-cat="super"]   { background: #533483; }
  .filter-btn.active[data-cat="dex"]     { background: #2b6e3f; }
  .filter-btn.active[data-cat="trash"]   { background: #555; }

  .count {
    text-align: right;
    font-size: 0.8rem;
    color: #666;
    padding-bottom: 8px;
  }

  .card-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .card {
    display: flex;
    flex-direction: column;
    padding: 10px;
    background: #16213e;
    border-radius: 12px;
    transition: transform 0.1s;
    min-width: 0;
  }

  .card:active { transform: scale(0.98); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 4px;
    margin-bottom: 6px;
  }

  .card-info { min-width: 0; }

  .card-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
    word-break: keep-all;
  }

  .card-name-en {
    font-size: 0.65rem;
    color: #666;
  }

  .card-moves {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 6px;
    font-size: 0.68rem;
  }

  .card-moves-group {
    display: flex;
    align-items: baseline;
    gap: 3px;
    flex-wrap: wrap;
  }

  .move-label {
    color: #666;
    font-weight: 600;
    flex-shrink: 0;
  }

  .move-name {
    color: #ccc;
  }

  .move-rank {
    color: #888;
    font-size: 0.6rem;
  }

  .card-note {
    font-size: 0.65rem;
    color: #999;
    margin-top: 4px;
    line-height: 1.3;
  }

  .badge {
    flex-shrink: 0;
    padding: 2px 7px;
    border-radius: 8px;
    font-size: 0.6rem;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  .badge-powerup { background: #e94560; }
  .badge-ultra   { background: #0f3460; }
  .badge-super   { background: #533483; }
  .badge-dex     { background: #2b6e3f; }
  .badge-trash   { background: #555; }

  .empty {
    text-align: center;
    padding: 40px 0;
    color: #555;
    font-size: 0.9rem;
  }

  @media (max-width: 360px) {
    .card-list { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="container">
  <h1>포켓몬GO 관리 가이드</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="포켓몬 이름 검색 (한글/영문)" autocomplete="off">
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">전체</button>
    <button class="filter-btn" data-cat="powerup">강화</button>
    <button class="filter-btn" data-cat="ultra">하이퍼 CP2500↓</button>
    <button class="filter-btn" data-cat="super">슈퍼 CP1500↓</button>
    <button class="filter-btn" data-cat="dex">도감용</button>
    <button class="filter-btn" data-cat="trash">버림</button>
  </div>

  <div class="count" id="count"></div>
  <div class="card-list" id="list"></div>
</div>

<script>
// 캐시 무효화: 타임스탬프를 붙여서 data.js를 항상 최신으로 로드
document.write('<scr' + 'ipt src="data.js?v=' + Date.now() + '"><\/scr' + 'ipt>');
</script>
<script>
const CATEGORY_LABELS = {
  powerup: '강화',
  ultra: 'CP2500↓',
  super: 'CP1500↓',
  dex: '도감',
  trash: '버림'
};

let allPokemon = [];
let currentCat = 'all';
let currentQuery = '';

function loadData() {
  allPokemon = POKEMON_DATA.pokemon;
  render();
}

function render() {
  const list = document.getElementById('list');
  const countEl = document.getElementById('count');
  const q = currentQuery.toLowerCase();

  const filtered = allPokemon.filter(p => {
    const cats = Array.isArray(p.category) ? p.category : [p.category];
    const matchCat = currentCat === 'all' || cats.includes(currentCat);
    const matchSearch = !q ||
      p.name.toLowerCase().includes(q) ||
      p.nameEn.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  countEl.textContent = `${filtered.length}마리`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-info">
          <div class="card-name">${escapeHtml(p.name)}</div>
          <div class="card-name-en">${escapeHtml(p.nameEn)}</div>
        </div>
        ${(Array.isArray(p.category) ? p.category : [p.category]).map(c => `<span class="badge badge-${c}">${CATEGORY_LABELS[c]}</span>`).join(' ')}
      </div>
      ${renderMoves(p)}
      ${p.note ? `<div class="card-note">${escapeHtml(p.note)}</div>` : ''}
    </div>
  `).join('');
}

function renderMoves(p) {
  const fast = p.fast || [];
  const charged = p.charged || [];
  if (fast.length === 0 && charged.length === 0) return '';

  const formatMoves = (moves) => moves.map((m, i) =>
    `<span class="move-name">${escapeHtml(m)}</span>${i === 0 && moves.length > 1 ? '<span class="move-rank"> / </span>' : ''}`
  ).join('');

  let html = '<div class="card-moves">';
  if (fast.length > 0) {
    html += `<div class="card-moves-group"><span class="move-label">노말</span>${formatMoves(fast)}</div>`;
  }
  if (charged.length > 0) {
    html += `<div class="card-moves-group"><span class="move-label">스페셜</span>${formatMoves(charged)}</div>`;
  }
  html += '</div>';
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 검색
document.getElementById('search').addEventListener('input', e => {
  currentQuery = e.target.value;
  render();
});

// 필터 버튼
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

loadData();
</script>

</body>
</html>
